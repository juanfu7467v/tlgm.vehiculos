# fly.toml app configuration file for tlgm-vehiculos
app = 'tlgm-vehiculos'
primary_region = 'ams'

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']
  # Tiempo de espera antes de apagar (8 minutos = 480 segundos)
  idle_timeout = '480s'

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
