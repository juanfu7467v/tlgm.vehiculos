app = 'tlgm-vehiculos'
primary_region = 'ams'

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']
  idle_timeout = '300s' # Reducido a 5 min para ahorrar recursos

  # Este bloque es CRÍTICO para que la URL cargue al entrar
  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/health"

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512 # Aumentado a 512 para evitar fallos de arranque con Telethon
